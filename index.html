<!DOCTYPE html>
<html>
<head>
  <title>Living Legends</title>
  <style>
    body {
      font-family: monospace;
      background: #0f0f0f;
      color: #eaeaea;
      padding: 20px;
    }

    h1 {
      color: #f5c542;
    }

    .panel {
      margin-bottom: 20px;
      padding: 15px;
      border: 1px solid #333;
      background: #181818;
    }

    .button-group button {
      margin: 5px;
      padding: 10px;
      background: #222;
      color: #fff;
      border: 1px solid #444;
      cursor: pointer;
    }

    .button-group button:hover {
      background: #333;
    }

    .highlight {
      color: #f54242;
    }

    .unity {
      color: #42f57b;
    }

    .boundary {
      color: #f5c542;
    }

    .fragmentation {
      color: #f54242;
    }
  </style>
</head>
<body>

<h1>⚔️ Living Legends</h1>

<div class="panel">
  <strong>SYSTEM STATE:</strong>
  <div id="system"></div>
</div>

<div class="panel">
  <strong>WORLD</strong>
  <pre id="entities"></pre>
</div>

<div class="panel">
  <strong>LATEST EVENT</strong>
  <pre id="latest"></pre>
</div>

<div class="panel">
  <strong>HISTORY</strong>
  <pre id="history"></pre>
</div>

<div class="panel button-group">
  <strong>WORLD ACTIONS</strong><br/>
  <button onclick="step('fragmentation')">Fracture the Realm</button>
  <button onclick="step('boundary')">Sustain the Tension</button>
  <button onclick="step('unity')">Reclaim the Throne</button>
</div>

<div class="panel button-group">
  <strong>CHARACTER ACTIONS</strong><br/>
  <button onclick="characterAction('corrupt', 'Heir')">Corrupt the Heir</button>
  <button onclick="characterAction('pressure', 'General')">Pressure the General</button>
  <button onclick="characterAction('protect', 'King')">Protect the King</button>
  <button onclick="characterAction('restore', 'Heir')">Restore the Heir</button>
</div>

<div class="panel">
  <button onclick="reset()">Reset World</button>
</div>

<script src="app.js"></script>

</body>
</html>
