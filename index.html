<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Living Legends</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Living Legends</h1>
        <p class="subtitle">A living chronicle shaped by structure and intervention.</p>
      </div>

      <div class="status-card">
        <div class="status-label">Realm State</div>
        <div id="system" class="status-value">INITIAL</div>
      </div>
    </header>

    <main class="layout">
      <section class="panel world-panel">
        <div class="panel-header">
          <h2>World State</h2>
        </div>
        <pre id="entities">Loading...</pre>
      </section>

      <section class="panel chronicle-panel">
        <div class="panel-header">
          <h2>Chronicle</h2>
        </div>

        <div id="latest-card" class="latest-card">
          <div class="latest-label">Latest Event</div>
          <pre id="latest">Connecting...</pre>
        </div>

        <div class="chronicle-feed">
          <pre id="history">No turns yet.</pre>
        </div>
      </section>

      <section class="panel controls-panel">
        <div class="panel-header">
          <h2>World Setup</h2>
        </div>

        <div class="button-row">
          <button onclick="loadPreset('royal_betrayal')">Royal Betrayal</button>
          <button onclick="loadPreset('fractured_court')">Fractured Court</button>
          <button onclick="loadPreset('collapse_edge')">Collapse Edge</button>
          <button class="ghost" onclick="resetWorld()">Reset World</button>
        </div>
      </section>

      <section class="panel controls-panel">
        <div class="panel-header">
          <h2>Guide the World</h2>
        </div>

        <div class="button-row">
          <button onclick="worldAction('fragmentation')">Fracture the Realm</button>
          <button onclick="worldAction('boundary')">Sustain the Tension</button>
          <button onclick="worldAction('unity')">Reclaim the Throne</button>
        </div>
      </section>

      <section class="panel controls-panel">
        <div class="panel-header">
          <h2>Intervene in the Cast</h2>
        </div>

        <div class="controls-grid">
          <div class="field">
            <label for="character">Character</label>
            <select id="character">
              <option value="King">King</option>
              <option value="Oracle">Oracle</option>
              <option value="General">General</option>
              <option value="Heir">Heir</option>
            </select>
          </div>
        </div>

        <div class="button-row">
          <button onclick="selectedCharacterAction('corrupt')">Corrupt</button>
          <button onclick="selectedCharacterAction('pressure')">Pressure</button>
          <button onclick="selectedCharacterAction('protect')">Protect</button>
          <button onclick="selectedCharacterAction('restore')">Restore</button>
          <button onclick="selectedCharacterAction('collapse')">Collapse</button>
        </div>
      </section>

      <section class="panel controls-panel">
        <div class="panel-header">
          <h2>Major Interventions</h2>
        </div>

        <div class="button-row">
          <button onclick="comboAction('betray_king')">Betray the King</button>
          <button onclick="comboAction('fracture_court')">Fracture the Court</button>
          <button onclick="comboAction('fortify_realm')">Fortify the Realm</button>
          <button onclick="comboAction('restore_heir')">Restore the Heir</button>
          <button onclick="comboAction('collapse_general')">Collapse the General</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
